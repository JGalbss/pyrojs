name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build library
        run: pnpm --filter pyrojs build

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Test
        run: pnpm --filter pyrojs test

      - name: Build docs
        run: pnpm --filter @pyro/docs build
